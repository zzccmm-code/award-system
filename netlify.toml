[build]
  command = "npm install && npx vite build"
  publish = "dist"

# API proxy: forward /api/* to Railway backend (must come first)
[[redirects]]
  from = "/api/*"
  to = "https://award-system-production.up.railway.app/api/:splat"
  status = 200

# SPA routing: catch-all to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
